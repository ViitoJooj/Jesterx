version: "3.9"

services:
  postgres_test:
    image: postgres:16-alpine
    container_name: jesterx_postgres_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jesterx_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jesterx_test"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes: {}
